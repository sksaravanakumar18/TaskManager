name: cloudops

services:
  # ── Google Pub/Sub Emulator ──────────────────────────────────────────────────
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=local-project
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Pub/Sub topic + subscription bootstrap ────────────────────────────────────
  pubsub-init:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    depends_on:
      pubsub-emulator:
        condition: service_healthy
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    entrypoint: /bin/bash
    command: >
      -c "
      curl -s -X PUT http://pubsub-emulator:8085/v1/projects/local-project/topics/task-events &&
      curl -s -X PUT http://pubsub-emulator:8085/v1/projects/local-project/subscriptions/analytics-sub
        -H 'Content-Type: application/json'
        -d '{\"topic\":\"projects/local-project/topics/task-events\",\"ackDeadlineSeconds\":30}' &&
      curl -s -X PUT http://pubsub-emulator:8085/v1/projects/local-project/subscriptions/notification-sub
        -H 'Content-Type: application/json'
        -d '{\"topic\":\"projects/local-project/topics/task-events\",\"ackDeadlineSeconds\":30}' &&
      echo 'Pub/Sub emulator bootstrapped'
      "
    restart: on-failure

  # ── Redis (task-service cache) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── auth-service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-minimum-32-characters}
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── task-service ──────────────────────────────────────────────────────────────
  task-service:
    build:
      context: ./backend/task-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: gcp
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: local-project
      PUBSUB_TOPIC_TASK_EVENTS: task-events
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── analytics-service ─────────────────────────────────────────────────────────
  analytics-service:
    build:
      context: ./backend/analytics-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: gcp
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: local-project
      PUBSUB_SUBSCRIPTION_ANALYTICS: analytics-sub
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── notification-service ──────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: gcp
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GCP_PROJECT_ID: local-project
      PUBSUB_SUBSCRIPTION_NOTIFICATION: notification-sub
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── gateway-service ───────────────────────────────────────────────────────────
  gateway-service:
    build:
      context: ./backend/gateway-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-minimum-32-characters}
      AUTH_SERVICE_URL: http://auth-service:8082
      TASK_SERVICE_URL: http://task-service:8081
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6
