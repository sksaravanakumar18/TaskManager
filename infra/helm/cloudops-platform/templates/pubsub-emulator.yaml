{{- if .Values.pubsubEmulator.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pubsub-emulator
  namespace: {{ include "cloudops-platform.namespace" . }}
  labels:
    {{- include "cloudops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: pubsub-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pubsub-emulator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pubsub-emulator
        app.kubernetes.io/part-of: cloudops-platform
    spec:
      containers:
        - name: pubsub-emulator
          image: {{ .Values.pubsubEmulator.image }}
          args:
            - gcloud
            - beta
            - emulators
            - pubsub
            - start
            - --host-port=0.0.0.0:{{ .Values.pubsubEmulator.port }}
            - --project={{ .Values.pubsubEmulator.projectId }}
          ports:
            - name: http
              containerPort: {{ .Values.pubsubEmulator.port }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pubsub-emulator
  namespace: {{ include "cloudops-platform.namespace" . }}
  labels:
    {{- include "cloudops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: pubsub-emulator
spec:
  selector:
    app.kubernetes.io/name: pubsub-emulator
  ports:
    - name: http
      port: {{ .Values.pubsubEmulator.port }}
      targetPort: http
{{- end }}
