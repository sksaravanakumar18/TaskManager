{{- range $name, $config := .Values.services }}
{{- if $config.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "cloudops-platform.namespace" $ }}
  labels:
    {{- include "cloudops-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
spec:
  type: {{ $config.serviceType }}
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: http
      port: {{ $config.port }}
      targetPort: http
{{- end }}
{{- end }}
