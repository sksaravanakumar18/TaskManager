{{- range $name, $config := .Values.services }}
{{- if and $config.enabled $config.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ include "cloudops-platform.namespace" $ }}
  labels:
    {{- include "cloudops-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
  {{- with $config.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
