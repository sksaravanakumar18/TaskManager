{{- if .Values.pubsubEmulator.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: pubsub-bootstrap
  namespace: {{ include "cloudops-platform.namespace" . }}
  labels:
    {{- include "cloudops-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: pubsub-bootstrap
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pubsub-bootstrap
        app.kubernetes.io/part-of: cloudops-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:8.8.0
          command:
            - sh
            - -c
            - >
              until curl -sf http://pubsub-emulator:{{ .Values.pubsubEmulator.port }} >/dev/null; do echo waiting for emulator; sleep 3; done;
              curl -sf -X PUT http://pubsub-emulator:{{ .Values.pubsubEmulator.port }}/v1/projects/{{ .Values.pubsubEmulator.projectId }}/topics/task-events;
              curl -sf -X PUT http://pubsub-emulator:{{ .Values.pubsubEmulator.port }}/v1/projects/{{ .Values.pubsubEmulator.projectId }}/subscriptions/analytics-sub -H 'Content-Type: application/json' -d '{"topic":"projects/{{ .Values.pubsubEmulator.projectId }}/topics/task-events","ackDeadlineSeconds":30}';
              curl -sf -X PUT http://pubsub-emulator:{{ .Values.pubsubEmulator.port }}/v1/projects/{{ .Values.pubsubEmulator.projectId }}/subscriptions/notification-sub -H 'Content-Type: application/json' -d '{"topic":"projects/{{ .Values.pubsubEmulator.projectId }}/topics/task-events","ackDeadlineSeconds":30}';
{{- end }}